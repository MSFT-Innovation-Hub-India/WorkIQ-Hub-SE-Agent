<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#grad)"/>
  <!-- AI Robot Head -->
  <rect x="8" y="10" width="16" height="14" rx="3" fill="white"/>
  <!-- Eyes -->
  <circle cx="12" cy="16" r="2" fill="#2563eb"/>
  <circle cx="20" cy="16" r="2" fill="#7c3aed"/>
  <!-- Glowing eye effect -->
  <circle cx="12" cy="16" r="1" fill="#60a5fa"/>
  <circle cx="20" cy="16" r="1" fill="#a78bfa"/>
  <!-- Mouth/Speaker -->
  <rect x="11" y="20" width="10" height="2" rx="1" fill="#4b5563"/>
  <!-- Antenna -->
  <line x1="16" y1="10" x2="16" y2="6" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="16" cy="5" r="2" fill="#60a5fa"/>
</svg>
